<!doctype html>
<html>
  <head>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      window.TrelloPowerUp.initialize({
        "board-buttons": function (t) {
          return [
            {
              icon: {
                dark: window.location.origin + "/images/link-icon-light.svg",
                light: window.location.origin + "/images/link-icon-dark.svg",
              },
              text: "Smart Attachments",
              callback: function (t) {
                return t.modal({
                  url: "./index.html?view=settings",
                  fullscreen: false,
                  title: "Attachment Display Settings",
                });
              },
            },
          ];
        },

        // "card-badges": function (t) {
        //   return t.card("attachments").then(function (card) {
        //     const count = card.attachments?.length || 0;

        //     if (!count) return [];

        //     return [
        //       {
        //         text: count + " attachments",
        //         color: "orange",
        //       },
        //     ];
        //   });
        // },

        "card-badges": async (t) => {
          const [card, settings] = await Promise.all([
            t.card("attachments"),
            t.get("board", "shared", "smartAttachmentSettings"),
          ]);

          const attachments = card.attachments || [];
          const hiddenTypes = settings?.hiddenTypes || [];
          const badgeColor = settings?.bgColor || "orange";

          const visibleAttachments = attachments.filter((att) => {
            const ext = att.name.split(".").pop().toLowerCase();
            return !hiddenTypes.includes(ext);
          });

          if (!visibleAttachments.length) {
            return [];
          }

          return visibleAttachments.map((att) => ({
            text: att.name,
            color: badgeColor,
          }));
        },
      });
    </script>
  </body>
</html>
